/**:
  local_costmap:
    ros__parameters:
      global_frame: world
      robot_base_frame: x500_lidar_2d_0/link/base_link_stabilized
      rolling_window: true
      width: 60
      height: 60
      resolution: 0.5
      update_frequency: 20.0
      publish_frequency: 20.0
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan_stabilized
        max_obstacle_height: 20.0
        min_obstacle_height: 0.0
        scan_stabilized:
          topic: /scan_stabilized
          obstacle_max_range: 28.0
          raytrace_max_range: 29.0
          max_obstacle_height: 20.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5
        cost_scaling_factor: 3.0