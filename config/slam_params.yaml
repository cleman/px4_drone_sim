slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    odom_frame: world
    map_frame: map
    base_frame: x500_lidar_2d_0/link/base_link_stabilized
    scan_topic: /scan_stabilized
    use_sim_time: true
    mode: mapping

    # Map update rate
    map_update_interval: 0.2        # seconds → 5 Hz
    resolution: 0.05                # was map_resolution (wrong key)

    # TF / timing fixes
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    queue_size: 100                 # was message_filter_queue_size (wrong key)

    # Lidar range (suppress the min range warning)
    minimum_laser_range: 0.1
    maximum_laser_range: 20.0